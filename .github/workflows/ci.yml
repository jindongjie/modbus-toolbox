name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check

      - name: Run tests
        run: cargo test

      - name: Clippy
        run: cargo clippy
