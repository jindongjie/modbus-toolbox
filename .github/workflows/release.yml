name: Build and Release

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
          - target: i686-pc-windows-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build
        run: cross build --target ${{ matrix.target }} --release

      - name: Package (Linux)
        if: "!contains(matrix.target, 'windows')"
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/modbus_toolbox dist/
          cd dist
          tar czf ../modbus_toolbox-${{ matrix.target }}.tar.gz modbus_toolbox

      - name: Package (Windows)
        if: contains(matrix.target, 'windows')
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/modbus_toolbox.exe dist/
          cd dist
          zip ../modbus_toolbox-${{ matrix.target }}.zip modbus_toolbox.exe

      - name: Upload artifact (Linux)
        if: "!contains(matrix.target, 'windows')"
        uses: actions/upload-artifact@v4
        with:
          name: modbus_toolbox-${{ matrix.target }}.tar.gz
          path: modbus_toolbox-${{ matrix.target }}.tar.gz

      - name: Upload artifact (Windows)
        if: contains(matrix.target, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: modbus_toolbox-${{ matrix.target }}.zip
          path: modbus_toolbox-${{ matrix.target }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
