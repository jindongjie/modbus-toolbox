[package]
name = "modbus_toolbox"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.40", features = ["rt-multi-thread", "macros", "signal", "time"] }
tokio-modbus = { version = "0.16", default-features = false, features = ["rtu-server"] }
tokio-serial = "5.4"

clap = { version = "4.5", features = ["derive"] }

ratatui = "0.29"
crossterm = { version = "0.29", features = ["event-stream"] }

futures = "0.3"
anyhow = "1.0"

